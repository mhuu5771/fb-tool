<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>FB Lead Scan Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-[#0b0e14] text-gray-300 p-6">
    <div class="max-w-4xl mx-auto bg-[#161b22] border border-gray-800 rounded-2xl shadow-2xl overflow-hidden">
        <div class="p-6 bg-[#1c2128] border-b border-gray-800 flex justify-between items-center">
            <h1 class="text-lg font-bold text-blue-500">Ứng dụng lấy SĐT FB</h1>
            <button onclick="exportCSV()" id="exportBtn" class="hidden bg-emerald-600 hover:bg-emerald-500 text-white px-4 py-2 rounded-lg text-xs font-bold transition">
                XUẤT CSV
            </button>
        </div>

        <div class="p-6 grid grid-cols-1 md:grid-cols-4 gap-4">
            <input type="text" id="url" placeholder="Dán link Facebook..." class="md:col-span-2 bg-black border border-gray-700 p-3 rounded-xl outline-none focus:border-blue-500">
            <input type="number" id="limit" value="20" class="bg-black border border-gray-700 p-3 rounded-xl outline-none">
            <button onclick="startScan()" id="btn" class="bg-blue-600 hover:bg-blue-500 font-bold rounded-xl transition">QUÉT</button>
        </div>

        <div id="progressArea" class="hidden px-6 mb-4">
            <div class="flex justify-between text-[10px] mb-1 font-mono text-blue-400">
                <span>Đang trong quá trình lấy dữ liệu...</span>
                <span id="percentText">0%</span>
            </div>
            <div class="w-full bg-gray-800 h-1 rounded-full">
                <div id="progressBar" class="bg-blue-500 h-full w-0 transition-all duration-500"></div>
            </div>
        </div>

        <div class="p-6 pt-0 overflow-x-auto">
            <table class="w-full text-left text-sm">
                <thead class="text-gray-500 uppercase text-[10px] bg-[#1c2128]">
                    <tr>
                        <th class="p-3">STT</th>
                        <th class="p-3">UID</th>
                        <th class="p-3 text-green-500">Số điện thoại</th>
                    </tr>
                </thead>
                <tbody id="resultBody" class="divide-y divide-gray-800"></tbody>
            </table>
        </div>
    </div>

    <script>
        let fullData = [];
        async function startScan() {
            const url = document.getElementById('url').value;
            const limit = document.getElementById('limit').value;
            const btn = document.getElementById('btn');
            const progress = document.getElementById('progressArea');
            const bar = document.getElementById('progressBar');
            const text = document.getElementById('percentText');
            const tbody = document.getElementById('resultBody');

            if(!url) return alert("Thiếu link!");

            btn.disabled = true;
            progress.classList.remove('hidden');
            tbody.innerHTML = '';
            
            let p = 0;
            const inv = setInterval(() => { if(p < 90) { p+=1; bar.style.width = p+'%'; text.innerText = p+'%'; } }, 400);

            try {
                const res = await fetch('/scan', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({url, limit})
                });
                const data = await res.json();
                fullData = data;
                clearInterval(inv);
                bar.style.width = '100%'; text.innerText = '100%';

                if(data && Array.isArray(data) && data.length > 0) {
                    data.forEach((item, i) => {
                        tbody.innerHTML += `<tr class="hover:bg-gray-800/50">
                            <td class="p-3 text-gray-600">${i+1}</td>
                            <td class="p-3 font-mono text-gray-400">${item.uid}</td>
                            <td class="p-3 font-bold text-emerald-500">${item.phone}</td>
                        </tr>`;
                    });
                    document.getElementById('exportBtn').classList.remove('hidden');
                } else {
                    tbody.innerHTML = '<tr><td colspan="3" class="p-10 text-center">Không tìm thấy dữ liệu. Hãy đảm bảo Buildpack đã được cài.</td></tr>';
                }
            } catch(e) { alert("Lỗi kết nối server!"); }
            finally { btn.disabled = false; }
        }

        function exportCSV() {
            let csv = "STT,UID,Phone\n";
            fullData.forEach((d, i) => csv += `${i+1},'${d.uid},${d.phone}\n`);
            const blob = new Blob(["\ufeff"+csv], {type:'text/csv'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `data_${Date.now()}.csv`;
            link.click();
        }
    </script>
</body>
</html>
